<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0, #ffafbd);
            background-size: 200% 200%;
            animation: gradiente 8s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradiente {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: white;
            padding: 50px 60px;
            border-radius: 28px;
            box-shadow: 0 25px 70px rgba(255, 105, 135, 0.35);
            text-align: center;
            position: relative;
            animation: aparecer 0.6s ease-out;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .imagem-topo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff8fa3;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(255, 105, 135, 0.4);
        }

        h1 {
            color: #444;
            font-size: 28px;
            margin-bottom: 36px;
            font-weight: 700;
        }

        .botoes {
            display: flex;
            gap: 20px;
            justify-content: center;
            position: relative;
            height: 50px;
        }

        button {
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sim {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
        }

        #sim:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 26px rgba(76, 175, 80, 0.5);
        }

        #nao {
            background: linear-gradient(135deg, #f44336, #ef5350);
            color: white;
            position: fixed;
            box-shadow: 0 8px 20px rgba(244, 67, 54, 0.4);
        }

        .mensagem {
            margin-top: 24px;
            font-size: 22px;
            font-weight: 700;
            color: #e91e63;
            display: none;
            animation: aparecer 0.4s ease-out;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="imagem-topo" src="gato mimado.webp" alt="Foto">
        <h1>Vamo sair??</h1>
        <div class="botoes">
            <button id="sim">Sim!</button>
            <button id="nao">Não</button>
        </div>
        <p class="mensagem" id="mensagem">Sabia que você ia dizer sim! 🥰</p>
    </div>

    <script>
        const botaoNao = document.getElementById('nao');
        const botaoSim = document.getElementById('sim');
        const mensagem = document.getElementById('mensagem');

        function moverBotaoNao() {
            const margem = botaoNao.offsetWidth + 20;
            const margemAltura = botaoNao.offsetHeight + 20;
            const maxX = window.innerWidth - margem;
            const maxY = window.innerHeight - margemAltura;

            const novoX = Math.max(10, Math.random() * maxX);
            const novoY = Math.max(10, Math.random() * maxY);

            botaoNao.style.left = novoX + 'px';
            botaoNao.style.top = novoY + 'px';
        }

        // desktop: foge ao passar o mouse por cima
        botaoNao.addEventListener('mouseenter', moverBotaoNao);

        // mobile: foge ao tentar tocar, antes do clique completar
        botaoNao.addEventListener('touchstart', function (e) {
            e.preventDefault();
            moverBotaoNao();
        }, { passive: false });

        // mobile: rede de segurança - se por algum motivo o toque "acertar"
        // mesmo assim (ex: toque muito rápido), também foge no click
        botaoNao.addEventListener('click', function (e) {
            e.preventDefault();
            moverBotaoNao();
        });

        // recalcula limites se a tela girar ou for redimensionada
        window.addEventListener('resize', function () {
            if (botaoNao.style.position === 'fixed' && botaoNao.style.left) {
                moverBotaoNao();
            }
        });

        botaoSim.addEventListener('click', function () {
            mensagem.style.display = 'block';
            document.querySelector('h1').textContent = 'Combinado! 🎉';
            document.querySelector('.botoes').style.display = 'none';
        });
    </script>
</body>
</html>
