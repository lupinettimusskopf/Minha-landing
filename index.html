<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Você conhece o Enzito?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            padding: 40px;
            max-width: 480px;
            width: 100%;
            animation: aparecer 0.5s ease-out;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topo-quiz {
            text-align: center;
            margin-bottom: 28px;
        }

        .topo-quiz h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        .progresso-texto {
            font-size: 14px;
            color: #888;
            font-weight: 500;
        }

        .barra-progresso {
            width: 100%;
            height: 8px;
            background-color: #eee;
            border-radius: 10px;
            margin-top: 12px;
            overflow: hidden;
        }

        .barra-progresso-interna {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .pergunta-texto {
            font-size: 19px;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.4;
        }

        .alternativas {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .alternativa-botao {
            background-color: #f5f5f8;
            border: 2px solid #f5f5f8;
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 500;
            color: #444;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .alternativa-botao:hover:not(:disabled) {
            border-color: #764ba2;
            background-color: #f0ecfa;
            transform: translateX(4px);
        }

        .alternativa-botao .letra {
            display: inline-block;
            width: 26px;
            height: 26px;
            line-height: 26px;
            text-align: center;
            background-color: #e0e0ea;
            border-radius: 50%;
            margin-right: 12px;
            font-weight: 700;
            font-size: 13px;
            color: #666;
        }

        .alternativa-botao.correta {
            background-color: #e6f7ed;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .alternativa-botao.correta .letra {
            background-color: #4caf50;
            color: white;
        }

        .alternativa-botao.errada {
            background-color: #fdeaea;
            border-color: #f44336;
            color: #c62828;
        }

        .alternativa-botao.errada .letra {
            background-color: #f44336;
            color: white;
        }

        .alternativa-botao:disabled {
            cursor: default;
        }

        .botao-proxima {
            display: none;
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .botao-proxima:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(118, 75, 162, 0.35);
        }

        /* TELA DE RESULTADO */
        .tela-resultado {
            display: none;
            text-align: center;
        }

        .tela-resultado .emoji-resultado {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .tela-resultado h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        .tela-resultado .subtexto {
            color: #888;
            font-size: 15px;
            margin-bottom: 28px;
        }

        .placar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .placar-item {
            flex: 1;
            padding: 20px;
            border-radius: 16px;
        }

        .placar-item.acertos {
            background-color: #e6f7ed;
        }

        .placar-item.erros {
            background-color: #fdeaea;
        }

        .placar-item .numero {
            font-size: 32px;
            font-weight: 700;
        }

        .placar-item.acertos .numero {
            color: #4caf50;
        }

        .placar-item.erros .numero {
            color: #f44336;
        }

        .placar-item .label {
            font-size: 13px;
            color: #888;
            font-weight: 500;
            margin-top: 4px;
        }

        .botao-reiniciar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .botao-reiniciar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(118, 75, 162, 0.35);
        }
    </style>
</head>
<body>
    <div class="quiz-container">

        <!-- TELA DE PERGUNTAS -->
        <div id="tela-quiz">
            <div class="topo-quiz">
                <h1>Vamos ver se vc ta Sabendo Leid</h1>
                <p class="progresso-texto" id="progresso-texto">Pergunta 1 de 3</p>
                <div class="barra-progresso">
                    <div class="barra-progresso-interna" id="barra-progresso-interna"></div>
                </div>
            </div>

            <p class="pergunta-texto" id="pergunta-texto"></p>

            <div class="alternativas" id="alternativas"></div>

            <button class="botao-proxima" id="botao-proxima">Próxima pergunta →</button>
        </div>

        <!-- TELA DE RESULTADO -->
        <div class="tela-resultado" id="tela-resultado">
            <div class="emoji-resultado" id="emoji-resultado"></div>
            <h2 id="titulo-resultado">Resultado final</h2>
            <p class="subtexto" id="subtexto-resultado"></p>

            <div class="placar">
                <div class="placar-item acertos">
                    <div class="numero" id="numero-acertos">0</div>
                    <div class="label">Acertos</div>
                </div>
                <div class="placar-item erros">
                    <div class="numero" id="numero-erros">0</div>
                    <div class="label">Erros</div>
                </div>
            </div>

            <button class="botao-reiniciar" id="botao-reiniciar">Jogar de novo</button>
        </div>

    </div>

    <script>
        const perguntas = [
            {
                pergunta: "Quantos anos eu tenho em ?",
                alternativas: ["17", "18", "20", "21"],
                correta: 1
            },
            {
                pergunta: "E meu aniversário em?",
                alternativas: ["15 de maio", "28 de maio", "9 de maio", "2 de maio"],
                correta: 1
            },
            {
                pergunta: "QUE curso eu faço leid?",
                alternativas: ["Ciência da Computação", "Engenharia de Software", "Sistemas de Informação", "Análise e Desenvolvimento de Sistemas"],
                correta: 1
            }
        ];

        let perguntaAtual = 0;
        let acertos = 0;
        let erros = 0;

        const letras = ['a', 'b', 'c', 'd'];

        const telaQuiz = document.getElementById('tela-quiz');
        const telaResultado = document.getElementById('tela-resultado');
        const perguntaTexto = document.getElementById('pergunta-texto');
        const alternativasDiv = document.getElementById('alternativas');
        const botaoProxima = document.getElementById('botao-proxima');
        const progressoTexto = document.getElementById('progresso-texto');
        const barraProgressoInterna = document.getElementById('barra-progresso-interna');

        function carregarPergunta() {
            const dados = perguntas[perguntaAtual];
            perguntaTexto.textContent = dados.pergunta;
            alternativasDiv.innerHTML = '';
            botaoProxima.style.display = 'none';

            progressoTexto.textContent = `Pergunta ${perguntaAtual + 1} de ${perguntas.length}`;
            barraProgressoInterna.style.width = `${((perguntaAtual) / perguntas.length) * 100}%`;

            dados.alternativas.forEach((texto, index) => {
                const botao = document.createElement('button');
                botao.className = 'alternativa-botao';
                botao.innerHTML = `<span class="letra">${letras[index]}</span>${texto}`;
                botao.addEventListener('click', () => responder(index));
                alternativasDiv.appendChild(botao);
            });
        }

        function responder(indiceEscolhido) {
            const dados = perguntas[perguntaAtual];
            const botoes = alternativasDiv.querySelectorAll('.alternativa-botao');

            botoes.forEach((botao, index) => {
                botao.disabled = true;
                if (index === dados.correta) {
                    botao.classList.add('correta');
                } else if (index === indiceEscolhido) {
                    botao.classList.add('errada');
                }
            });

            if (indiceEscolhido === dados.correta) {
                acertos++;
            } else {
                erros++;
            }

            botaoProxima.style.display = 'block';
            barraProgressoInterna.style.width = `${((perguntaAtual + 1) / perguntas.length) * 100}%`;
        }

        function mostrarResultado() {
            telaQuiz.style.display = 'none';
            telaResultado.style.display = 'block';

            document.getElementById('numero-acertos').textContent = acertos;
            document.getElementById('numero-erros').textContent = erros;

            const emojiResultado = document.getElementById('emoji-resultado');
            const subtextoResultado = document.getElementById('subtexto-resultado');

            if (acertos === perguntas.length) {
                emojiResultado.textContent = '';
                subtextoResultado.textContent = 'Boooooa leid ta sabendo.';
            } else if (acertos >= perguntas.length / 2) {
                emojiResultado.textContent = '';
                subtextoResultado.textContent = 'Até que sabe, mas to de zoi';
            } else {
                emojiResultado.textContent = '';
                subtextoResultado.textContent = 'sei não em leid acho que n ta sabendo de nada';
            }
        }

        botaoProxima.addEventListener('click', () => {
            perguntaAtual++;
            if (perguntaAtual < perguntas.length) {
                carregarPergunta();
            } else {
                mostrarResultado();
            }
        });

        document.getElementById('botao-reiniciar').addEventListener('click', () => {
            perguntaAtual = 0;
            acertos = 0;
            erros = 0;
            telaResultado.style.display = 'none';
            telaQuiz.style.display = 'block';
            carregarPergunta();
        });

        carregarPergunta();
    </script>
</body>
</html>
